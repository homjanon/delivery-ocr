<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>送货单 → Excel 识别</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>送货单 → Excel 自动识别</h1>
    <p class="sub">上传送货单图片，调用视觉大模型识别，生成固定表头 Excel 下载。全部在浏览器本地完成。</p>
  </header>

  <section class="card">
    <h3>① 模型设置（移植自 portfolio 仓的大模型，均为 OpenAI 兼容接口）</h3>
    <label>模型预设
      <select id="preset">
        <option value="glm52">NVIDIA GLM-5.2（视觉·推荐，可做送货单 OCR）</option>
        <option value="qw397">NVIDIA Qwen 3.5-397B VLM（视觉·推荐，同 Key）</option>
        <option value="qw122">NVIDIA Qwen 3.5-122B VLM（视觉，同 Key）</option>
        <option value="dsv4">商汤 DeepSeek-V4-Flash（文本兜底）</option>
        <option value="sfds">硅基流动 DeepSeek-V4-Flash（文本兜底）</option>
        <option value="nemo">NVIDIA Nemotron-3-Ultra-550B（文本兜底）</option>
        <option value="custom">自定义…</option>
      </select>
    </label>
    <label>API Base URL
      <input id="baseUrl" type="text" placeholder="https://integrate.api.nvidia.com/v1">
    </label>
    <label id="apiKeyLabel">API Key（NVIDIA_API_KEY，仅存本机会话，关页即清）
      <input id="apiKey" type="password" placeholder="NVIDIA_API_KEY" autocomplete="off">
    </label>
    <label>模型名
      <input id="model" type="text" placeholder="z-ai/glm-5.2">
    </label>
    <label>台头公司名称
      <input id="company" type="text" placeholder="例如：江门市某某贸易有限公司">
    </label>
  </section>

  <section class="card">
    <h3>② 上传送货单（可多选，3–4 张，自动压缩）</h3>
    <input id="fileInput" type="file" accept="image/*" multiple>
    <div id="preview" class="preview"></div>
  </section>

  <section class="card actions">
    <button id="runBtn" class="primary">识别并生成 Excel</button>
    <button id="downloadBtn" disabled>下载 Excel</button>
    <span id="status" class="status"></span>
  </section>

  <section class="card">
    <h3>③ 识别结果预览</h3>
    <div id="log" class="log"></div>
    <div id="tableWrap" class="table-wrap"></div>
  </section>

  <p class="foot">提示：API Key 不会上传到任何服务器，仅用于浏览器直连你填写的模型接口。个人自用请勿公开分享本页面。</p>
</div>

<script src="vendor/xlsx.full.min.js"></script>
<script src="js/prompt.js"></script>
<script src="js/excel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
