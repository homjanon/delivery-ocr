<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>送货单 → Excel 识别</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>送货单 → Excel 自动识别</h1>
    <p class="sub">上传送货单图片，调用视觉大模型识别，生成固定表头 Excel 下载。全部在浏览器本地完成。</p>
  </header>

  <section class="card">
    <h3>① 模型设置（国内厂商，均浏览器直连、无需代理）</h3>
    <label>模型预设
      <select id="preset">
        <option value="zhipu">智谱 GLM-4.6V-Flash（视觉·免费·繁忙时换付费）</option>
        <option value="qwen35b">硅基流动 Qwen3.5-35B-A3B（视觉·便宜·付费）</option>
      </select>
    </label>
  </section>

  <section class="card">
    <h3>API Key 设置（填一次永久记住，切换预设自动匹配对应 Key）</h3>
    <label>智谱 API Key（GLM-4.6V-Flash）
      <input id="zhipuApiKey" type="password" placeholder="粘贴智谱 API Key" autocomplete="off">
    </label>
    <label>硅基流动 API Key（Qwen3.5-397B-A17B / Qwen3.5-35B-A3B）
      <input id="siliconflowApiKey" type="password" placeholder="粘贴硅基流动 API Key" autocomplete="off">
    </label>
  </section>

  <section class="card">
    <h3>② 上传送货单（可多选，3–4 张，自动压缩）</h3>
    <input id="fileInput" type="file" accept="image/*" multiple>
    <div id="preview" class="preview"></div>
  </section>

  <section class="card actions">
    <button id="runBtn" class="primary">识别并生成 Excel</button>
    <button id="downloadBtn" disabled>下载 Excel</button>
    <span id="status" class="status"></span>
  </section>

  <section class="card">
    <h3>③ 识别结果预览</h3>
    <div id="log" class="log"></div>
    <div id="tableWrap" class="table-wrap"></div>
  </section>

  <p class="foot">提示：API Key 不会上传到任何服务器，仅用于浏览器直连你填写的模型接口。个人自用请勿公开分享本页面。</p>
</div>

<script src="vendor/xlsx.full.min.js"></script>
<script src="js/prompt.js"></script>
<script src="js/excel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
